site_name: Chenxu's Blog
site_url: https://chenxukwok.github.io/mkdocs-site/

site_author: Chenxu
theme:
    name: material
    language: en
    favicon: https://s2.loli.net/2024/04/26/PmRdM9iGnvOJHgu.png
    logo: https://raw.githubusercontent.com/ChenxuKwok/pictures/img/paints/beach.png
    palette: 
     - secheme: default
       toggle: 
            icon: material/brightness-7 
            text: Switch to dark mode
     - scheme: slate
       toggle: 
            icon: material/brightness-4 
            text: Switch to light mode

    features:
        - navigation.tabs
        - navigation.instant   #- header.autohide  #自动隐藏
        #- announce.dismiss   #呈现可标记为由用户读取的临时公告，可以包含一个用于取消当前公告的按钮
        - navigation.tracking   #地址栏中的 URL 将自动更新为在目录中突出显示的活动锚点
        - navigation.tabs   #顶级部分将呈现在上面视口标题下方的菜单层中，但在移动设备上保持原样
        #- navigation.tabs.sticky    #启用粘性选项卡后，导航选项卡将锁定在标题下方，并在向下滚动时始终保持可见
        #- navigation.sections   #启用部分后，顶级部分在边栏中呈现为1220px以上视口的组，但在移动设备上保持原样
        - navigation.top   # 返回顶部的按钮 在上滑时出现
        - search.suggest   # 搜索输入一些字母时推荐补全整个单词
        - search.highlight   # 搜索出的文章关键词加入高亮
        - navigation.expand   # 打开Tab时左侧目录全部展开
        #- navigation.indexes   #启用节索引页后，可以将文档直接附加到节
        - search.share   #搜索分享按钮
    icon:
      repo: fontawesome/brands/github #右上角图标
      logo: logo

repo_url: https://github.com/ChenxuKwok
repo_name: ChenxuGuo

# nav:
#     - Home: index.md

copyright: Copyright &copy; 2022~2024 Chenxu/All Rights Reserved.
extra:
  # tags:
  #   HTML5: html
  #   JavaScript: js
  #   CSS: css
  generator: false  #删除页脚显示“使用 MkDocs 材料制造”
  social:
    - icon: fontawesome/brands/x-twitter 
      link: https://twitter.com/ChenxuGuo1225
    - icon: fontawesome/brands/github
      link: https://github.com/ChenxuKwok

    - icon: fontawesome/regular/envelope
      link: mailto:<louis.kwok.work@gmail.com> #联系方式
  analytics: 
    provider: google
    property: G-29HZMNR0KG
    feedback:
      title: Dose this page help you?
      ratings:
        - icon: material/thumb-up-outline
          name: This page was helpful
          data: 1
          note: >-
            Thanks for your feedback!
        - icon: material/thumb-down-outline
          name: This page could be improved
          data: 0
          note: >- 
            Thanks for your feedback! Help us improve this page by
            using our <a href="https://marketingplatform.google.com/about/analytics/" target="_blank" rel="noopener">feedback form</a>.


plugins:
  # - glightbox
  - open-in-new-tab
  - search
  - statistics:
      page_check_metadata: comment
  - git-revision-date-localized:
      type: iso_date
      enable_creation_date: false
      exclude:
        - index.md 
        - waline.md
  # - git-authors:
  #     exclude:
  #       - index.md
  # - blog:
  #     post_date_format: full #时间
  #     draft: true
  #     draft_if_future_date: true #自动将具有未来日期的帖子标记为草稿
  #     post_readtime: true
  #     post_readtime_words_per_minute: 265  #计算帖子的阅读时间时读者每分钟预计阅读的字数
  #     post_url_format: "{date}/{slug}"
  #     # categories_toc: true
  #     # pagination_per_page: 5
  #     pagination_url_format: "page/{page}"
  #     authors_file: "{blog}/.authors.yml"  #作者信息

markdown_extensions:
  - abbr
  - attr_list
  - admonition
  - def_list
  - footnotes
  - md_in_html
  - meta # 支持Markdown文件上方自定义标题标签等
  - pymdownx.caret
  - pymdownx.betterem
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.smartsymbols
  - pymdownx.tilde
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format # 代码块高亮插件
  - pymdownx.arithmatex:  # latex支持
      generic: true
  - toc:
      permalink: true # 固定标题位置为当前位置
  - pymdownx.highlight: # 代码块高亮
      anchor_linenums: true
      linenums: true # 显示行号
      # auto_title: true # 显示编程语言名称
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - markdown.extensions.toc:
      slugify: !!python/object/apply:pymdownx.slugs.slugify {kwds: {case: lower}}
      permalink: "\ue157"
  - pymdownx.pathconverter:
      base_path: '' # default: ''
      relative_path: '' # default ''
      absolute: false # default: false
      tags: 'a script img link object embed'


extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js